<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tic Tac Toe 🎮</h1>

<p id="status">Player X's Turn</p>
<p id="score">X: 0 | O: 0</p>

<button id="modeBtn">Play vs Computer</button>

<div class="board">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
</div>

<button id="resetBtn">Reset Game</button>

<script>
    const cells = document.querySelectorAll(".cell");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("status");
    const scoreText = document.getElementById("score");
    const modeBtn = document.getElementById("modeBtn");

    let currentPlayer = "X";
    let gameActive = true;
    let vsComputer = false;

    let score = { X: 0, O: 0 };

    const winPatterns = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    cells.forEach((cell, index) => {
        cell.addEventListener("click", function() {
            if (!gameActive || cell.textContent !== "") return;

            makeMove(cell);

            if (vsComputer && gameActive && currentPlayer === "O") {
                setTimeout(computerMove, 400);
            }
        });
    });

    function makeMove(cell) {
        cell.textContent = currentPlayer;
        playSound();

        if (checkWinner()) return;
        if (checkDraw()) return;

        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusText.textContent = "Player " + currentPlayer + "'s Turn";
    }

    // 🤖 SMART AI
    function computerMove() {
        let bestScore = -Infinity;
        let move;

        cells.forEach((cell, index) => {
            if (cell.textContent === "") {
                cell.textContent = "O";
                let score = minimax(false);
                cell.textContent = "";
                if (score > bestScore) {
                    bestScore = score;
                    move = index;
                }
            }
        });

        makeMove(cells[move]);
    }

    function minimax(isMaximizing) {
        let winner = getWinner();

        if (winner === "O") return 1;
        if (winner === "X") return -1;
        if (isBoardFull()) return 0;

        if (isMaximizing) {
            let bestScore = -Infinity;
            cells.forEach(cell => {
                if (cell.textContent === "") {
                    cell.textContent = "O";
                    let score = minimax(false);
                    cell.textContent = "";
                    bestScore = Math.max(score, bestScore);
                }
            });
            return bestScore;
        } else {
            let bestScore = Infinity;
            cells.forEach(cell => {
                if (cell.textContent === "") {
                    cell.textContent = "X";
                    let score = minimax(true);
                    cell.textContent = "";
                    bestScore = Math.min(score, bestScore);
                }
            });
            return bestScore;
        }
    }

    function getWinner() {
        for (let pattern of winPatterns) {
            const [a,b,c] = pattern;
            if (
                cells[a].textContent &&
                cells[a].textContent === cells[b].textContent &&
                cells[a].textContent === cells[c].textContent
            ) {
                return cells[a].textContent;
            }
        }
        return null;
    }

    function isBoardFull() {
        return [...cells].every(cell => cell.textContent !== "");
    }

    function checkWinner() {
        for (let pattern of winPatterns) {
            const [a,b,c] = pattern;

            if (
                cells[a].textContent &&
                cells[a].textContent === cells[b].textContent &&
                cells[a].textContent === cells[c].textContent
            ) {
                statusText.textContent = cells[a].textContent + " Wins! 🎉";
                gameActive = false;

                score[cells[a].textContent]++;
                updateScore();

                cells[a].classList.add("win");
                cells[b].classList.add("win");
                cells[c].classList.add("win");

                return true;
            }
        }
        return false;
    }

    function checkDraw() {
        if ([...cells].every(cell => cell.textContent !== "")) {
            statusText.textContent = "It's a Draw! 🤝";
            gameActive = false;
            return true;
        }
        return false;
    }

    function updateScore() {
        scoreText.textContent = "X: " + score.X + " | O: " + score.O;
    }

    function playSound() {
        let audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
        audio.play();
    }

    resetBtn.addEventListener("click", function() {
        cells.forEach(cell => {
            cell.textContent = "";
            cell.classList.remove("win");
        });

        currentPlayer = "X";
        gameActive = true;
        statusText.textContent = "Player X's Turn";
    });

    modeBtn.addEventListener("click", function() {
        vsComputer = !vsComputer;

        modeBtn.textContent = vsComputer ? "2 Player Mode" : "Play vs Computer";

        resetBtn.click();
    });
</script>

</body>
</html>
